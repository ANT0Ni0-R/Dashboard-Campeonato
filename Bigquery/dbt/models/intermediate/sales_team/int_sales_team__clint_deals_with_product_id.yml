version: 2

models:
  - name: int_sales_team__clint_deals_with_product_id
    description: >
      Deals (com person_id) + product_id canonico via de-para regra+excecao.
      Grao 1:1 com int_sales_team__clint_deals_cleaned_with_person_id.
      product_id NULL = grupo nao mapeado (ex. "Nao usar") -- intencional.
    columns:
      - name: product_id
        description: >
          product_id canonico do deal (origem vence grupo). NULL quando o
          group_name nao tem regra no de-para. Relationships ignora NULL.
        data_tests:
          - relationships:
              to: ref('dim_produto')
              field: product_id
