version: 2

models:
  - name: int_sales_team__person_keys_pairs
    description: >
      Helper 1/3. Pares distintos (email, phone_key) normalizados das 4 fontes
      (deals, leads, pesquisas, transactions). Unico modelo que escaneia as
      fontes cruas. Grao = par distinto.
    columns:
      - name: match_key
        description: concat(coalesce(email,''),'|',coalesce(phone_key,'')). Grao da tabela.
        data_tests:
          - unique
          - not_null

  - name: int_sales_team__person_keys_graph
    description: >
      Helper 2/3. Grafo de identidade materializado: adjacencia (src, dst) entre
      nos de email ('e:') e telefone ('p:'), com self-loop e blocklist aplicada.
      Grao = aresta direcionada (cada aresta nao-direcionada aparece nos 2 sentidos).
    columns:
      - name: src
        description: No de origem ('e:<email>' ou 'p:<phone_key>').
      - name: dst
        description: No de destino vizinho (ou o proprio, no self-loop).

  - name: int_sales_team__person_keys
    description: >
      Modelo final 3/3. Crosswalk de identidade: 1 linha por par distinto
      (email, phone_key), carimbada com person_id canonico (mesma pessoa por
      email OU telefone, transitivamente). Substitui o join "ON email OR telefone"
      por um left join em match_key.
    columns:
      - name: match_key
        description: >
          Chave de join null-safe = concat(coalesce(email,''),'|',coalesce(phone_key,'')).
          Grao da tabela. Downstream: derive a mesma match_key e faca left join using(match_key).
        data_tests:
          - unique
          - not_null
      - name: person_id
        description: >
          Identificador canonico da pessoa (hash MD5 do representante do componente,
          tipicamente o menor email do grupo). Estavel e independente de ordem.
        data_tests:
          - not_null
      - name: email
        description: Email normalizado (lower/trim, NULL se vazio ou sem '@').
      - name: phone_key
        description: >
          Telefone normalizado = DDD + ultimos 8 digitos (DDI 55 removido, robusto
          ao 9o digito). NULL quando o nacional nao tem 10/11 digitos.

  - name: int_sales_team__transactions_with_sales_request_with_person_id
    description: >
      Transactions (fonte de verdade de GMV) + person_id. Grao 1:1 com
      int_sales_team__transactions_with_sales_request (so anexa a coluna, nao
      deduplica). person_id NULL apenas em linhas sem email/telefone usavel.
    columns:
      - name: person_id
        description: person_id canonico (ref ao int_sales_team__person_keys).
        data_tests:
          - relationships:
              to: ref('int_sales_team__person_keys')
              field: person_id

  - name: int_sales_team__pesquisas_compiladas_with_person_id
    description: >
      Pesquisas enriquecida com as duas chaves canonicas (person_id + product_id)
      + flag de dedup por pessoa/campanha. Grao 1:1 com a fonte (nao filtra).
    columns:
      - name: person_id
        description: person_id canonico (NULL se sem email/telefone usavel).
        data_tests:
          - relationships:
              to: ref('int_sales_team__person_keys')
              field: person_id
      - name: product_id
        description: >
          product_id canonico via de-para map_pesquisa_produto (join em campaign).
          NULL quando a campanha nao tem mapeamento. Relationships ignora NULL.
        data_tests:
          - relationships:
              to: ref('dim_produto')
              field: product_id
      - name: is_primary_person_campaign
        description: TRUE na primeira resposta de cada (person_id, campaign) por createddate.
        data_tests:
          - not_null

  - name: int_sales_team__leads_with_person_id
    description: >
      Leads + person_id + flag de dedup por pessoa/campanha. Grao 1:1 com a fonte
      (nao filtra). is_primary_person_campaign e por PESSOA (diferente do
      is_first_lead_campaign nativo, que e por email).
    columns:
      - name: person_id
        description: person_id canonico (NULL se sem email/telefone usavel).
        data_tests:
          - relationships:
              to: ref('int_sales_team__person_keys')
              field: person_id
      - name: is_primary_person_campaign
        description: TRUE no primeiro lead de cada (person_id, campanha) por lead_created_at.
        data_tests:
          - not_null

  - name: int_sales_team__clint_deals_cleaned_with_person_id
    description: >
      Deals enriquecido com as duas chaves canonicas (person_id + product_id) +
      flag de dedup por pessoa/origem. Grao 1:1 (1 linha por deal_id, nao filtra).
    columns:
      - name: person_id
        description: person_id canonico (NULL se sem email/telefone usavel).
        data_tests:
          - relationships:
              to: ref('int_sales_team__person_keys')
              field: person_id
      - name: product_id
        description: >
          product_id canonico via de-para map_clint_produto (origem vence grupo).
          NULL quando o group_name nao tem regra. Relationships ignora NULL.
        data_tests:
          - relationships:
              to: ref('dim_produto')
              field: product_id
      - name: is_primary_person_origin
        description: TRUE no primeiro deal de cada (person_id, origin_name) por created_at.
        data_tests:
          - not_null
