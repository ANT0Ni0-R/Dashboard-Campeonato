version: 2

models:
  - name: int_sales_team__person_keys
    description: >
      Crosswalk de identidade. Uma linha por par distinto (email, phone_key)
      observado nas 4 fontes (deals, leads, pesquisas, transactions). Cada par
      recebe um person_id canonico: a mesma pessoa ligada por email OU telefone
      (transitivamente, via connected components) compartilha o mesmo person_id.
      Serve para substituir o join "ON email OR telefone" por um join em match_key.
    columns:
      - name: match_key
        description: >
          Chave de join null-safe = concat(coalesce(email,''),'|',coalesce(phone_key,'')).
          Grao da tabela. Downstream: derive a mesma match_key e faca left join using(match_key).
        data_tests:
          - unique
          - not_null
      - name: person_id
        description: >
          Identificador canonico da pessoa (hash MD5 do representante do componente,
          tipicamente o menor email do grupo). Estavel e independente de ordem.
        data_tests:
          - not_null
      - name: email
        description: Email normalizado (lower/trim, NULL se vazio ou sem '@').
      - name: phone_key
        description: >
          Telefone normalizado = DDD + ultimos 8 digitos (DDI 55 removido, robusto
          ao 9o digito). NULL quando o nacional nao tem 10/11 digitos.

# Singular test sugerido (criar em tests/): assert_person_keys_phone_key_format.sql
# -> SELECT phone_key FROM {{ ref('int_sales_team__person_keys') }}
#    WHERE phone_key IS NOT NULL AND NOT REGEXP_CONTAINS(phone_key, r'^[0-9]{10}$')
