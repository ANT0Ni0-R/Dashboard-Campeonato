version: 2

models:
  - name: int_sales_team__person_keys_pairs
    description: >
      Helper 1/3. Pares distintos (email, phone_key) normalizados das 4 fontes
      (deals, leads, pesquisas, transactions). Unico modelo que escaneia as
      fontes cruas. Grao = par distinto.
    columns:
      - name: match_key
        description: concat(coalesce(email,''),'|',coalesce(phone_key,'')). Grao da tabela.
        data_tests:
          - unique
          - not_null

  - name: int_sales_team__person_keys_graph
    description: >
      Helper 2/3. Grafo de identidade materializado: adjacencia (src, dst) entre
      nos de email ('e:') e telefone ('p:'), com self-loop e blocklist aplicada.
      Grao = aresta direcionada (cada aresta nao-direcionada aparece nos 2 sentidos).
    columns:
      - name: src
        description: No de origem ('e:<email>' ou 'p:<phone_key>').
      - name: dst
        description: No de destino vizinho (ou o proprio, no self-loop).

  - name: int_sales_team__person_keys
    description: >
      Modelo final 3/3. Crosswalk de identidade: 1 linha por par distinto
      (email, phone_key), carimbada com person_id canonico (mesma pessoa por
      email OU telefone, transitivamente). Substitui o join "ON email OR telefone"
      por um left join em match_key.
    columns:
      - name: match_key
        description: >
          Chave de join null-safe = concat(coalesce(email,''),'|',coalesce(phone_key,'')).
          Grao da tabela. Downstream: derive a mesma match_key e faca left join using(match_key).
        data_tests:
          - unique
          - not_null
      - name: person_id
        description: >
          Identificador canonico da pessoa (hash MD5 do representante do componente,
          tipicamente o menor email do grupo). Estavel e independente de ordem.
        data_tests:
          - not_null
      - name: email
        description: Email normalizado (lower/trim, NULL se vazio ou sem '@').
      - name: phone_key
        description: >
          Telefone normalizado = DDD + ultimos 8 digitos (DDI 55 removido, robusto
          ao 9o digito). NULL quando o nacional nao tem 10/11 digitos.
