version: 2

models:
  - name: int_sales_team__deal_activation
    description: >
      Data de ativacao e vendedor-na-ativacao por deal, derivados do historico de
      etapas (snapshot de 30 min). Grao = 1 linha por deal_id. Ativacao = 1a fase
      alcancada que nao seja pre-ativacao. As UNICAS fases pre-ativacao sao a
      familia Base* e Novo*; todo o resto conta como ativacao (inclusive Engajado
      e as fases de saida/lateral Perdido/Contato invalido/Geladeira/Fechamento/Resgate*).
    columns:
      - name: deal_id
        description: PK / grao. Liga ao fct_funil e ao clint_deals_cleaned.
        data_tests:
          - unique
          - not_null
      - name: first_stage_at
        description: >
          MIN(entered_stage_at) sobre TODAS as etapas (incl. Base/Novo) = primeiro toque
          real do deal no Clint. Usado para corrigir data_criacao quando o created_at e um
          re-import em lote posterior ao historico.
      - name: activated_at
        description: MIN(entered_stage_at) entre as fases de ativacao (teto da ativacao real).
      - name: seller_ativado_pmp
        description: PMP do vendedor que estava no deal na 1a fase de ativacao.
      - name: seller_ativado_nome
        description: Nome do vendedor que estava no deal na 1a fase de ativacao.
