version: 2

# A source aponta para uma TABELA EXTERNA sobre Google Sheets, criada a mao no
# projeto do CRM (que voce controla). DDL em Bigquery/sheets_external_tables.sql.
# Compartilhe a planilha (Leitor) com:
#   - dbt-user-access@grupo-primo-prd.iam.gserviceaccount.com  (SA do prod/ci)
#   - sua conta Google                                          (dev / oauth)
sources:
  - name: google_sheets
    database: grupo-primo-crm-prd
    schema: staging
    description: Planilhas mantidas a mao, conectadas ao BQ via tabela externa (de-paras).
    tables:
      - name: map_clint_produto
        description: >
          De-para Clint -> produto (regra+excecao). Colunas: group_name,
          origin_name (vazio = regra de grupo), product_id, match_level, revisar.

models:
  - name: stg_google_sheets__map_clint_produto
    description: >
      Limpeza 1:1 do de-para Clint -> produto. Grao = regra de mapeamento
      (origem PREENCHIDA = excecao; origem VAZIA = default do grupo).
    columns:
      - name: product_id
        description: product_id canonico de destino (ref ao seed dim_produto).
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_produto')
              field: product_id
      - name: group_name
        description: group_name da Clint (chave da regra). Nunca nulo.
        data_tests:
          - not_null
    # Garante no maximo 1 regra por (group_name, origin_name) -- origin_name NULL
    # (regra de grupo) tambem precisa ser unica por grupo.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - group_name
            - origin_name
