version: 2

models:
  - name: fct_funil
    description: >
      GOLD do funil de vendas. Grao = 1 linha por deal_id (deal enriquecido) +
      linhas de venda TVD orfas (deal_id NULL, vendas do time de vendas sem deal
      casavel). Carrega person_id + product_id canonicos, datas e atribuicao de
      ativacao e venda (dupla), flags/campos de pesquisa, midia do lead e atributos
      da Clint. Fonte de verdade da venda = transactions sales_channel='TVD'.
    columns:
      - name: deal_id
        description: >
          Grao. NULL apenas nas linhas de venda TVD orfa (sem deal casavel). Unico
          entre as linhas com deal.
        data_tests:
          - unique:
              config:
                where: "deal_id is not null"
      - name: person_id
        description: Pessoa canonica.
        data_tests:
          - relationships:
              to: ref('int_sales_team__person_keys')
              field: person_id
              config:
                where: "person_id is not null"
      - name: product_id
        description: Produto canonico (de-para). NULL quando a fonte nao mapeou.
        data_tests:
          - relationships:
              to: ref('dim_produto')
              field: product_id
              config:
                where: "product_id is not null"
      - name: gmv
        description: GMV TVD atribuido ao deal (0 quando sem venda). Nao duplica entre deals.
      - name: has_venda
        description: TRUE se ha venda TVD atribuida a esta linha.
      - name: is_ativado
        description: TRUE se o deal alcancou a ativacao (activated_at nao nulo).
      - name: data_criacao
        description: >
          Criacao do deal = LEAST(created_at, 1a etapa do historico). Usa o historico como
          1o toque real quando o created_at e um re-import em lote posterior.
      - name: data_criacao_origem
        description: >
          Flag de monitoramento: 'historico' quando o 1o toque do historico foi usado (e mais
          antigo que o created_at, tipico de re-import em lote); 'created_at' caso contrario.
      - name: data_ativado
        description: Data da 1a fase de ativacao (de int_sales_team__deal_activation).
      - name: data_venda
        description: Data da 1a venda TVD atribuida (NULL se sem venda).
      - name: has_pesquisa
        description: TRUE se a pessoa respondeu pesquisa daquele produto.
      - name: tier
        description: >
          Tier do deal (tier_final da int): usa deal_tier; quando vazio, deriva das tags
          "Tier [1-4]" do contato (product-aware via map_campanha_produto, melhor tier no
          conflito). Cobertura FPF 27%->91%.
      - name: tier_origem
        description: "Origem do tier: 'deal' (deal_tier) | 'tag' (derivado das tags) | NULL."
