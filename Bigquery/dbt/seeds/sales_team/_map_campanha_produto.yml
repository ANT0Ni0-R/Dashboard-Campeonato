version: 2

seeds:
  - name: map_campanha_produto
    description: >
      De-para codigo de campanha -> produto, mantido a mao. Serve LEADS (campanha)
      e PESQUISA (campaign) -- mesmo universo de codigos. Grao = 1 linha por codigo,
      enumerado (sem prefixo), pra resistir a mudanca de fluxo de lancamento.
      product_id vazio = campanha ainda nao mapeada (revisar=sim) -> fica NULL.
      Resolvido nos modelos *_with_person_id de leads e pesquisas.
    columns:
      - name: campaign
        description: Codigo da campanha (chave). Casa com leads.campanha e pesquisas.campaign.
        data_tests:
          - not_null
          - unique
      - name: product_id
        description: product_id canonico (ref ao seed dim_produto). Vazio = nao mapeado.
        data_tests:
          # valida so os preenchidos (robusto a como o seed carrega celula vazia)
          - relationships:
              to: ref('dim_produto')
              field: product_id
              config:
                where: "product_id is not null and product_id != ''"
