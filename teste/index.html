<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[TESTE] Ranking de Receita — Conexão Supabase</title>
  <!-- Reaproveita o tema visual do dashboard de produção -->
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="teste.css">
</head>
<body>
  <div class="app-container">
    <!-- Header do Dashboard -->
    <header>
      <div class="header-title-section">
        <span class="logo-copa">🏆</span>
        <div>
          <h1>Ranking de Receita</h1>
          <span class="product-tag" id="product-name">TESTE • Todos os produtos</span>
        </div>
      </div>

      <div class="header-meta-section">
        <!-- Status de Conexão com o Supabase -->
        <div class="status-indicator">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-label">Conectando...</span>
        </div>

        <!-- Selo de última atualização -->
        <div class="fase-info">
          <span class="fase-label">Última atualização</span>
          <span class="fase-nome" id="last-update">—</span>
        </div>
      </div>
    </header>

    <!-- Corpo Principal: o ranking é injetado aqui via JS -->
    <main class="main-content" id="dashboard-body"></main>
  </div>

  <!-- Banner visual de "atualizado" -->
  <div class="update-toast" id="update-toast">
    <span class="update-toast-icon">🔄</span>
    <span id="update-toast-text">Dados atualizados</span>
  </div>

  <!-- Scripts: reaproveita as credenciais do config.js de produção -->
  <script src="../config.js"></script>
  <script src="teste.js"></script>
</body>
</html>
