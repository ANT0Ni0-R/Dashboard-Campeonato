<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <base target="_top">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Plus+Jakarta+Sans:wght@400;500&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #060913; background-image: radial-gradient(circle at 30% -10%, #0e162d 0%, #060913 60%);
      color: #f8fafc; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem;
      color-scheme: dark;
    }
    .card {
      background: rgba(15, 23, 42, 0.65); border: 1px solid rgba(51, 65, 85, 0.55);
      border-radius: 18px; padding: 2.4rem 2.6rem; max-width: 480px; text-align: center;
      backdrop-filter: blur(12px);
    }
    .lock { font-size: 3rem; }
    h1 { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.6rem; margin: 1rem 0 0.6rem;
      background: linear-gradient(135deg, #fff 30%, #fbbf24 110%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p { color: #94a3b8; line-height: 1.5; font-size: 0.95rem; }
    .email { color: #f8fafc; font-weight: 600; }
    .hint { margin-top: 1rem; font-size: 0.8rem; color: #64748b; }
  </style>
</head>
<body>
  <div class="card">
    <div class="lock">🔒</div>
    <h1>Acesso restrito</h1>
    <p>
      <? if (email) { ?>
        A conta <span class="email"><?= email ?></span> nao esta liberada para este dashboard.
      <? } else { ?>
        Nao foi possivel identificar sua conta. Acesse com seu e-mail do Grupo Primo.
      <? } ?>
    </p>
    <p class="hint">Peca a um administrador para adicionar seu e-mail na aba <b>Acessos</b> da planilha.</p>
  </div>
</body>
</html>
