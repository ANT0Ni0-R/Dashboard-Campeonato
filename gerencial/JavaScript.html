<script>
  // ===== Estado =====
  var state = {
    mode: 'supabase',          // supabase | bigquery | vendas
    dash: null,                // ultimo payload do dashboard
    rankScope: 'total',        // total | hoje
    horaMode: 'acumulado',     // acumulado | spot
    diaMode: 'spot',           // spot | acumulado
    pollMs: 60000,
    pollToken: 0,
    proximo: 0,
    periodo: null,             // { inicio, fim } do seletor de datas
    funil: null,               // payload do snapshot do funil
    funilFiltro: { dia: '', origem: '', vend: '', origemScope: 'lancamento', vendScope: 'lancamento', tmrScope: 'lancamento' },
    funilSort: { col: 'conv', dir: 'desc' }   // ordenacao da tabela por vendedor (col + asc/desc)
  };
  var charts = { hora: null, dia: null, diaShare: null,
    fHora: null, fDia: null, fTmrHora: null, fBolha: null };

  // ===== Util =====
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
      return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c];
    });
  }
  function iniciais(nome) {
    var p = String(nome || '').trim().split(/\s+/);
    return (((p[0] || '')[0] || '') + ((p[p.length - 1] || '')[0] || '')).toUpperCase();
  }
  function formatBRL(v) {
    return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 }).format(v || 0);
  }
  function formatBRLk(v) {
    return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL', notation: 'compact', maximumFractionDigits: 1 }).format(v || 0);
  }
  function pct(v) { return (100 * (v || 0)).toFixed(1).replace('.', ',') + '%'; }
  function formatInt(v) { return new Intl.NumberFormat('pt-BR').format(Math.round(v || 0)); }
  function pct0(v) { return Math.round(100 * (v || 0)) + '%'; }
  function pct2(v) { return (100 * (v || 0)).toFixed(2).replace('.', ',') + '%'; }
  function formatMin(v) { return (v > 0) ? (Number(v).toFixed(1).replace('.', ',') + "'") : '—'; }
  function dataHoraBR(iso) {
    var d = new Date(iso);
    if (isNaN(d)) return esc(iso);
    return d.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit', timeZone: 'America/Sao_Paulo' });
  }
  function diaLabel(ymd) {
    var p = String(ymd).split('-');
    return p.length === 3 ? p[2] + '/' + p[1] : ymd;
  }
  function cumulativo(arr) {
    var s = 0; return arr.map(function (v) { s += (v || 0); return s; });
  }
  function cssVar(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
  function themeColors() {
    return {
      text: cssVar('--text'), text2: cssVar('--text-2'), muted: cssVar('--text-muted'),
      gold: cssVar('--gold'), green: cssVar('--green'), blue: cssVar('--blue'),
      red: cssVar('--red'), grid: cssVar('--grid-line'), surface2: cssVar('--surface-2')
    };
  }

  // ===== Tema =====
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('btn-theme').textContent = (t === 'dark') ? '🌙' : '☀️';
    try { localStorage.setItem('gerencial-theme', t); } catch (e) {}
  }
  function toggleTheme() {
    var atual = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    applyTheme(atual);
    // recria os graficos com as novas cores so quando a respectiva view esta visivel
    if (state.dash && !document.getElementById('view-dash').hidden) renderDash(state.dash);
    var vf = document.getElementById('view-funil');
    if (state.funil && vf && !vf.hidden) aplicarFunil();
  }

  // ===== Status =====
  function setStatus(estado, msg) {
    var dot = document.getElementById('status-dot');
    dot.className = 'dot' + (estado === 'ok' ? '' : estado === 'load' ? ' load' : ' erro');
    document.getElementById('status-texto').textContent =
      estado === 'ok' ? 'ao vivo' : estado === 'load' ? 'carregando…' : (msg || 'erro');
  }
  function tickContagem() {
    var el = document.getElementById('status-contagem');
    if (state.mode !== 'supabase' || !state.proximo) { el.textContent = ''; return; }
    var s = Math.max(0, Math.round((state.proximo - Date.now()) / 1000));
    el.textContent = '· ' + s + 's';
  }

  // ===== Troca de view =====
  function setView(name) {
    document.getElementById('view-dash').hidden = (name !== 'dash');
    document.getElementById('view-info').hidden = (name !== 'info');
    document.getElementById('view-vendas').hidden = (name !== 'vendas');
    var funil = document.getElementById('view-funil');
    if (funil) funil.hidden = (name !== 'funil');
    document.getElementById('daterange').style.visibility =
      (name === 'vendas' || name === 'funil') ? 'hidden' : 'visible';
  }
  function switchMode(mode) {
    state.mode = mode;
    state.pollToken++; // cancela polling anterior
    document.querySelectorAll('#seg-view button').forEach(function (b) {
      b.classList.toggle('active', b.dataset.mode === mode);
    });
    if (mode === 'vendas') { setView('vendas'); setStatus('ok'); buscarVendas(); return; }
    if (mode === 'funil') { setView('funil'); carregarFunil(); return; }
    if (mode === 'bigquery') { carregarBigQuery(); return; }
    setView('dash'); carregarSupabase();
  }

  // ===== Carregamento Real-time (Supabase) =====
  function carregarSupabase() {
    var token = ++state.pollToken;
    setStatus('load');
    google.script.run
      .withSuccessHandler(function (data) {
        if (token !== state.pollToken) return;     // resposta obsoleta
        setStatus('ok'); state.dash = data; renderDash(data);
        state.pollMs = (data.config && data.config.pollSegundos ? data.config.pollSegundos : 60) * 1000;
        state.proximo = Date.now() + state.pollMs;
        setTimeout(function () { if (token === state.pollToken && state.mode === 'supabase') carregarSupabase(); }, state.pollMs);
      })
      .withFailureHandler(function (e) {
        if (token !== state.pollToken) return;
        setStatus('erro', (e && e.message) ? e.message : 'erro');
        state.proximo = Date.now() + 60000;
        setTimeout(function () { if (token === state.pollToken && state.mode === 'supabase') carregarSupabase(); }, 60000);
      })
      .getDashboardSupabase(state.periodo);
  }

  // ===== Carregamento Comissao (BigQuery) — le o snapshot da planilha =====
  function carregarBigQuery() {
    setView('dash');
    setStatus('load');
    state.proximo = 0;
    var token = ++state.pollToken;
    google.script.run
      .withSuccessHandler(function (data) {
        if (token !== state.pollToken) return;
        state.dash = data; renderDash(data);
        var dot = document.getElementById('status-dot'); dot.className = 'dot';
        var t = data.snapshotEm ? dataHoraBR(data.snapshotEm) : '';
        document.getElementById('status-texto').textContent = t ? 'snapshot ' + t : 'snapshot';
      })
      .withFailureHandler(function (e) {
        if (token !== state.pollToken) return;
        setView('info');
        document.getElementById('info-msg').innerHTML =
          '💰 <b>Comissao (BigQuery)</b><br><br>' + esc((e && e.message) ? e.message : 'Snapshot indisponivel.');
        setStatus('erro', 'sem snapshot');
      })
      .getDashboardBigQuery();
  }

  // ===== Render do dashboard (Q1..Q4) =====
  function renderDash(data) {
    var cfg = data.config || {};
    document.getElementById('titulo').textContent = cfg.titulo || 'Dashboard';
    document.getElementById('produto').textContent = cfg.produto || '';
    document.getElementById('kpi-fonte').textContent = data.fonte || '';
    if (cfg.inicio) prefillData('dt-inicio', cfg.inicio);
    if (cfg.fim) prefillData('dt-fim', cfg.fim);

    renderKpis(data.kpis || { hoje: {}, total: {} });
    renderRanking(data.ranking || []);
    renderChartHora(data.porHora || []);
    renderChartDia(data.porDia || []);
  }
  function prefillData(id, iso) {
    var el = document.getElementById(id);
    if (!el.value && iso) el.value = String(iso).slice(0, 10);
  }

  // ----- Q1: KPIs -----
  function renderKpis(kpis) {
    var wrap = document.getElementById('kpi-wrap');
    wrap.innerHTML = scopeHTML('HOJE', kpis.hoje || {}, 'hoje') + scopeHTML('GERAL', kpis.total || {}, 'geral');
    fitKpis();
  }
  function scopeHTML(label, k, cls) {
    return '<div class="kpi-scope ' + cls + '">' +
      '<div class="kpi-scope-label">' + label + '</div>' +
      card('GMV Total', formatBRL(k.gmv_total), 'Vendas: <b>' + (k.vendas_total || 0) + '</b>', '') +
      card('GMV TVD', formatBRL(k.gmv_tvd), 'Vendas TVD: <b>' + (k.vendas_tvd || 0) + '</b>', 'tvd') +
      card('Share TVD', pct(k.share_tvd), 'em GMV', 'share') +
      card('Ticket Medio', formatBRL(k.ticket_total), 'TVD: <b>' + formatBRL(k.ticket_tvd) + '</b>', 'ticket') +
    '</div>';
  }
  function card(label, main, sub, cls) {
    return '<div class="kpi-card ' + cls + '">' +
      '<div class="kpi-label">' + label + '</div>' +
      '<div class="kpi-main">' + main + '</div>' +
      '<div class="kpi-sub">' + sub + '</div></div>';
  }
  // Encolhe a fonte de cada valor ate caber no card (sem "..."), partindo do maior tamanho.
  function fitKpis() {
    var MAX = 34, MIN = 12;
    document.querySelectorAll('#kpi-wrap .kpi-main').forEach(function (el) {
      var size = MAX;
      el.style.fontSize = size + 'px';
      while (size > MIN && el.scrollWidth > el.clientWidth) {
        size -= 1; el.style.fontSize = size + 'px';
      }
    });
  }

  // ----- Q3: Ranking — podio (top 3) + lista (demais) -----
  function renderRanking(ranking) {
    var scope = state.rankScope;
    var lista = ranking.map(function (r) {
      return { code: r.code, nome: r.nome, foto: r.foto,
        gmv: scope === 'hoje' ? r.gmv_hoje : r.gmv,
        vendas: scope === 'hoje' ? r.vendas_hoje : r.vendas };
    }).sort(function (a, b) { return b.gmv - a.gmv || a.nome.localeCompare(b.nome); });

    var el = document.getElementById('rank-list');
    if (!lista.length) { el.className = 'rank-list'; el.innerHTML = '<div class="q-empty">Sem vendas TVD no periodo.</div>'; return; }
    // < 4 vendedores: sem lista, o podio ocupa todo o quadrante (classe podium-only).
    var resto = lista.slice(3);
    el.className = 'rank-list' + (resto.length ? '' : ' podium-only');
    el.innerHTML = podiumHTML(lista.slice(0, 3)) + listaHTML(resto, 4);
  }
  function avatarHTML(r) {
    return '<img src="' + esc(r.foto) + '" alt="" onload="this.className=\'loaded\'" onerror="this.remove()">' +
      '<span class="ini">' + esc(iniciais(r.nome)) + '</span>';
  }
  // Podio: ordem visual 2 - 1 - 3 (1o ao centro, mais alto). Sem medalha: a foto e o destaque.
  function podiumHTML(top3) {
    var ordem = [{ c: top3[1], pos: 2 }, { c: top3[0], pos: 1 }, { c: top3[2], pos: 3 }];
    var cards = ordem.map(function (o) {
      if (!o.c) { return '<div class="podium-place place-' + o.pos + '"></div>'; }
      var r = o.c;
      return '<div class="podium-place place-' + o.pos + (r.gmv <= 0 ? ' zero' : '') + '">' +
        '<div class="podium-card">' +
          '<div class="podium-name">' + esc(r.nome) + '</div>' +
          '<div class="podium-avatar">' + avatarHTML(r) + '</div>' +
          '<div class="podium-gmv">' + formatBRL(r.gmv) + '</div>' +
          '<div class="podium-vendas">' + (r.vendas || 0) + 'v</div>' +
        '</div>' +
        '<div class="podium-bar"><span class="podium-num">' + o.pos + '</span></div>' +
      '</div>';
    }).join('');
    return '<div class="podium">' + cards + '</div>';
  }
  function listaHTML(resto, startPos) {
    if (!resto.length) return '';
    return '<div class="copa-list">' + resto.map(function (r, i) {
      return '<div class="copa-list-row' + (r.gmv <= 0 ? ' zero' : '') + '">' +
        '<div class="copa-list-pos">' + (startPos + i) + 'º</div>' +
        '<div class="copa-list-avatar">' + avatarHTML(r) + '</div>' +
        '<div class="copa-list-name">' + esc(r.nome) + '</div>' +
        '<div class="copa-list-vendas">' + (r.vendas || 0) + 'v</div>' +
        '<div class="copa-list-gmv">' + formatBRL(r.gmv) + '</div></div>';
    }).join('') + '</div>';
  }

  // ----- Q2: linha hora a hora -----
  function renderChartHora(porHora) {
    var c = themeColors();
    var labels = porHora.map(function (x) { return String(x.hora).padStart(2, '0') + 'h'; });
    var base = porHora.map(function (x) { return x.gmv_tvd || 0; });
    var vals = state.horaMode === 'acumulado' ? cumulativo(base) : base;

    if (charts.hora) charts.hora.destroy();
    var ctx = document.getElementById('chart-hora').getContext('2d');
    charts.hora = new Chart(ctx, {
      type: 'line',
      data: { labels: labels, datasets: [{
        label: 'GMV TVD', data: vals, borderColor: c.green, backgroundColor: c.green + '33',
        fill: true, tension: 0.3, pointRadius: 2, pointHoverRadius: 4, borderWidth: 2,
        datalabels: { display: 'auto', align: 'top', anchor: 'end', color: c.text2,
          font: { size: 9, weight: 'bold' }, formatter: function (v) { return v > 0 ? formatBRLk(v) : ''; } }
      }]},
      options: baseOpts(c, { y: rsAxis(c, false, '22%') }, { padTop: 26 })
    });
  }

  // Paleta para os vendedores no Q4 (ciclica). Cores distintas e legiveis nos dois temas.
  var SELLER_COLORS = ['#22c55e', '#3b82f6', '#fbbf24', '#a855f7', '#ef4444', '#14b8a6',
    '#f97316', '#ec4899', '#84cc16', '#6366f1', '#06b6d4', '#eab308'];

  // ----- Q4: dois graficos alinhados — Share (faixa de cima) sobre as barras TVD por vendedor -----
  function renderChartDia(porDia) {
    var c = themeColors();
    var labels = porDia.map(function (x) { return diaLabel(x.dia); });
    var acc = state.diaMode === 'acumulado';

    // Vendedores: uniao das chaves "sellers", ordenada pelo GMV TVD total (desc).
    var totByCode = {};
    porDia.forEach(function (d) {
      var s = d.sellers || {};
      Object.keys(s).forEach(function (code) { totByCode[code] = (totByCode[code] || 0) + (s[code] || 0); });
    });
    var codes = Object.keys(totByCode).sort(function (a, b) { return totByCode[b] - totByCode[a] || a.localeCompare(b); });

    // Nomes para a legenda (a partir do ranking ja carregado).
    var nameByCode = {};
    ((state.dash && state.dash.ranking) || []).forEach(function (r) { nameByCode[r.code] = r.nome; });

    // Um dataset de barra por vendedor (empilhado) com label de dado quando o segmento cabe.
    var barDs = codes.map(function (code, i) {
      var serie = porDia.map(function (d) { return (d.sellers && d.sellers[code]) || 0; });
      if (acc) serie = cumulativo(serie);
      return { label: nameByCode[code] || code, data: serie,
        backgroundColor: SELLER_COLORS[i % SELLER_COLORS.length], stack: 'g', yAxisID: 'y',
        datalabels: { display: 'auto', align: 'center', anchor: 'center', color: '#0b1120',
          font: { size: 9, weight: 'bold' }, formatter: function (v) { return v > 0 ? formatBRLk(v) : ''; } } };
    });

    // Total da pilha por dia (soma dos segmentos ja calculados em barDs) — rotulo no topo da barra.
    var totalSerie = labels.map(function (_, i) {
      return barDs.reduce(function (s, ds) { return s + (ds.data[i] || 0); }, 0);
    });
    var totalDs = { label: 'Total', type: 'line', data: totalSerie, yAxisID: 'y',
      borderColor: 'transparent', backgroundColor: 'transparent', pointRadius: 0, fill: false,
      hideInLegend: true,
      datalabels: { display: true, anchor: 'end', align: 'top', color: c.text, clamp: true,
        font: { size: 10, weight: 'bold' }, formatter: function (v) { return v > 0 ? formatBRLk(v) : ''; } } };

    // Share TVD = GMV TVD / GMV total do dia (recalculado no acumulado).
    var tvd = porDia.map(function (x) { return x.gmv_tvd || 0; });
    var tot = porDia.map(function (x) { return x.gmv_total || 0; });
    if (acc) { tvd = cumulativo(tvd); tot = cumulativo(tot); }
    var share = tvd.map(function (v, i) { return tot[i] > 0 ? v / tot[i] : 0; });

    var shareDs = { label: 'Share TVD', data: share, borderColor: c.gold,
      backgroundColor: c.gold, yAxisID: 'y1', tension: 0.3, pointRadius: 3, borderWidth: 2,
      datalabels: { display: 'auto', align: 'top', anchor: 'end', color: c.gold,
        font: { size: 9, weight: 'bold' }, formatter: function (v) { return pct(v); } } };

    // Grafico de cima: so a linha de Share (eixo proprio 0-100%), x oculto, alinhado as barras.
    if (charts.diaShare) charts.diaShare.destroy();
    charts.diaShare = new Chart(document.getElementById('chart-dia-share').getContext('2d'), {
      type: 'line',
      data: { labels: labels, datasets: [shareDs] },
      options: baseOpts(c, {
        x: { display: false, offset: true, grid: { display: false } },
        y1: shareAxis(c)
      }, { legend: false, padTop: 20 })
    });

    // Grafico de baixo: barras empilhadas por vendedor + overlay com o total no topo.
    if (charts.dia) charts.dia.destroy();
    charts.dia = new Chart(document.getElementById('chart-dia').getContext('2d'), {
      type: 'bar',
      data: { labels: labels, datasets: barDs.concat([totalDs]) },
      options: baseOpts(c, { y: rsAxis(c, true, '20%') }, { padTop: 26 })
    });
  }

  // ----- Opcoes/eixos compartilhados -----
  function baseOpts(c, scales, extra) {
    extra = extra || {};
    var xStacked = !!(scales.y && scales.y.stacked);
    return {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: extra.padTop || 18, right: 6 } },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: extra.legend === false
          ? { display: false }
          : { display: true, position: 'bottom', labels: { color: c.text2, boxWidth: 10, font: { size: 10 },
              filter: function (item, data) { return !(data.datasets[item.datasetIndex] || {}).hideInLegend; } } },
        datalabels: { display: false },
        tooltip: { callbacks: { label: function (it) {
          var v = it.parsed.y;
          return it.dataset.label + ': ' + (it.dataset.yAxisID === 'y1' ? pct(v) : formatBRL(v));
        }}}
      },
      scales: Object.assign({ x: { stacked: xStacked, grid: { color: c.grid }, ticks: { color: c.text2, font: { size: 10 } } } }, scales)
    };
  }
  function rsAxis(c, stacked, grace) {
    return { stacked: !!stacked, position: 'left', beginAtZero: true, grace: grace || '12%',
      afterFit: function (s) { s.width = 56; }, grid: { color: c.grid },
      ticks: { color: c.text2, font: { size: 10 }, callback: function (v) { return formatBRLk(v); } } };
  }
  // Eixo do Share na faixa de cima: a esquerda e com largura fixa (56) para alinhar com as barras.
  function shareAxis(c) {
    return { position: 'left', min: 0, max: 1, afterFit: function (s) { s.width = 56; },
      grid: { color: c.grid },
      ticks: { color: c.gold, font: { size: 10 }, callback: function (v) { return Math.round(v * 100) + '%'; } } };
  }

  // ===== Consulta de vendas (duas tabelas: minhas x gerais) =====
  function buscarVendas() {
    var termo = (document.getElementById('termo').value || '').trim();
    ['minhas-tbody', 'gerais-tbody'].forEach(function (id) {
      document.getElementById(id).innerHTML = '<tr><td colspan="5" class="vendas-msg">Buscando…</td></tr>';
    });
    document.getElementById('vendas-hint').textContent = '';
    document.getElementById('minhas-hint').textContent = '';
    document.getElementById('gerais-hint').textContent = '';
    google.script.run
      .withSuccessHandler(function (resp) { renderVendas(resp, termo); })
      .withFailureHandler(function (e) {
        var msg = '<tr><td colspan="5" class="vendas-msg err">' + esc((e && e.message) ? e.message : 'Erro ao consultar') + '</td></tr>';
        document.getElementById('minhas-tbody').innerHTML = msg;
        document.getElementById('gerais-tbody').innerHTML = msg;
      })
      .listarVendas(termo);
  }
  function limparVendas() { document.getElementById('termo').value = ''; buscarVendas(); }

  function renderVendas(resp, termo) {
    var meuPmp = (resp && resp.meuPmp) || '';
    var rows = (resp && resp.vendas) || [];
    var minhas = meuPmp ? rows.filter(function (r) { return r.pmp_code === meuPmp; }) : [];
    var gerais = meuPmp ? rows.filter(function (r) { return r.pmp_code !== meuPmp; }) : rows;

    document.getElementById('vendas-hint').textContent =
      rows.length + ' venda(s)' + (rows.length >= 500 ? ' (limite 500 — refine a busca)' : '');
    document.getElementById('minhas-title').textContent = meuPmp ? ('Minhas vendas (' + esc(meuPmp) + ')') : 'Minhas vendas';
    document.getElementById('minhas-hint').textContent = meuPmp ? (minhas.length + ' venda(s)') : '';
    document.getElementById('gerais-hint').textContent = gerais.length + ' venda(s)';

    renderVendasTabela('minhas-tbody', minhas, termo,
      meuPmp ? '' : 'Seu PMP nao esta cadastrado na aba Acessos (coluna PMP).');
    renderVendasTabela('gerais-tbody', gerais, termo, '');
  }
  function renderVendasTabela(tbodyId, rows, termo, emptyMsg) {
    var tbody = document.getElementById(tbodyId);
    if (!rows.length) {
      var msg = emptyMsg || ('Nenhuma venda nos ultimos 7 dias' + (termo ? ' para "' + esc(termo) + '"' : '') + '.');
      tbody.innerHTML = '<tr><td colspan="5" class="vendas-msg">' + esc(msg) + '</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(vendaRowHTML).join('');
  }
  function vendaRowHTML(r) {
    var contato = [r.email, r.phone].filter(Boolean).map(esc).join(' · ');
    var pmp = r.pmp_code
      ? esc(r.pmp_code) + (r.tvd ? '<span class="tag">TVD</span>' : '')
      : '<span class="none">sem PMP</span>';
    return '<tr>' +
      '<td class="v-data">' + dataHoraBR(r.created_at) + '</td>' +
      '<td class="v-cli"><div class="nome">' + esc(r.nome || '—') + '</div>' + (contato ? '<div class="contato">' + contato + '</div>' : '') + '</td>' +
      '<td class="v-slug">' + esc(r.slug || '—') + '</td>' +
      '<td class="v-pmp">' + pmp + '</td>' +
      '<td class="v-valor">' + formatBRL(r.price) + '</td></tr>';
  }

  // ============================================================
  //  FUNIL (so nivel gerencial) — snapshot lido de Snapshot_Funil
  // ============================================================
  function carregarFunil() {
    setStatus('load');
    state.proximo = 0;
    var token = ++state.pollToken;
    google.script.run
      .withSuccessHandler(function (data) {
        if (token !== state.pollToken) return;
        state.funil = data; renderFunil(data);
        document.getElementById('status-dot').className = 'dot';
        var t = data.snapshotEm ? dataHoraBR(data.snapshotEm) : '';
        document.getElementById('status-texto').textContent = t ? 'snapshot ' + t : 'snapshot';
      })
      .withFailureHandler(function (e) {
        if (token !== state.pollToken) return;
        setStatus('erro', (e && e.message) ? e.message : 'erro');
        document.getElementById('funil-kpis').innerHTML =
          '<div class="q-empty">' + esc((e && e.message) ? e.message : 'Snapshot do funil indisponivel.') + '</div>';
      })
      .getFunilData();
  }

  function renderFunil(data) {
    var cfg = data.config || {};
    document.getElementById('titulo').textContent = cfg.titulo || 'Dashboard';
    document.getElementById('produto').textContent = cfg.produto || '';
    document.getElementById('funil-prod').textContent = cfg.produto || cfg.titulo || '';
    popularSelectsFunil(data);
    aplicarFunil();
  }

  // dia default: hoje (SP) se estiver na janela; senao o ultimo dia com ativados.
  function diaDefaultFunil(data) {
    var hoje = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Sao_Paulo' });
    var dias = data.dias || [];
    if (dias.indexOf(hoje) >= 0) return hoje;
    var comDados = {};
    (data.ativados || []).forEach(function (a) { comDados[a.dia] = true; });
    var ult = dias.filter(function (d) { return comDados[d]; }).pop();
    return ult || dias[dias.length - 1] || hoje;
  }
  function popularSelectsFunil(data) {
    var fDia = document.getElementById('f-dia');
    fDia.innerHTML = (data.dias || []).map(function (d) {
      return '<option value="' + esc(d) + '">' + esc(diaLabel(d)) + '</option>';
    }).join('');
    state.funilFiltro.dia = diaDefaultFunil(data);
    fDia.value = state.funilFiltro.dia;

    var fOrigem = document.getElementById('f-origem');
    fOrigem.innerHTML = '<option value="">Todas</option>' + (data.origens || []).map(function (o) {
      return '<option value="' + esc(o) + '">' + esc(o) + '</option>';
    }).join('');
    fOrigem.value = state.funilFiltro.origem = '';

    var fVend = document.getElementById('f-vend');
    fVend.innerHTML = '<option value="">Todos</option>' + (data.vendedores || []).map(function (v) {
      return '<option value="' + esc(v.pmp) + '">' + esc(v.nome) + '</option>';
    }).join('');
    fVend.value = state.funilFiltro.vend = '';
  }

  // ----- Filtragem (counts agregam; TMR vem pre-agregado por grao) -----
  function fMatch(row, f) {
    if (f.origem && row.origem !== f.origem) return false;
    if (f.vend && row.pmp !== f.vend) return false;
    if (f.pmpEq && row.pmp !== f.pmpEq) return false;
    if (f.dia && row.dia !== f.dia) return false;
    return true;
  }
  function somaAtivados(f) {
    return ((state.funil && state.funil.ativados) || []).reduce(function (s, a) {
      return fMatch(a, f) ? s + a.n : s;
    }, 0);
  }
  function somaVendas(f) {
    return ((state.funil && state.funil.vendas) || []).reduce(function (s, v) {
      return fMatch(v, f) ? s + v.n : s;
    }, 0);
  }
  // base do pipeline considerando o filtro de origem (vendedor nao altera o pipeline).
  function baseFiltrada() {
    var fo = state.funilFiltro.origem;
    if (!fo) return (state.funil && state.funil.baseTotal) || 0;
    var b = ((state.funil && state.funil.basePorOrigem) || []).filter(function (x) { return x.origem === fo; })[0];
    return b ? b.total : 0;
  }
  // TMR pre-agregado: acha a linha do grao (dia/pmp/origem) — null = "todos" (dia null = lancamento).
  function tmrTotalLookup(dia, pmp, origem) {
    var rows = (state.funil && state.funil.tmrTotal) || [];
    for (var i = 0; i < rows.length; i++) {
      if ((rows[i].dia || null) === (dia || null) &&
          (rows[i].pmp || null) === (pmp || null) &&
          (rows[i].origem || null) === (origem || null)) return rows[i];
    }
    return null;
  }

  // ----- KPIs -----
  function renderFunilKpis() {
    var f = state.funilFiltro;
    var base = baseFiltrada();
    var ativAcum = somaAtivados({ origem: f.origem, vend: f.vend });
    var ativDia = somaAtivados({ origem: f.origem, vend: f.vend, dia: f.dia });
    var vendasAcum = somaVendas({ origem: f.origem, vend: f.vend });
    var pctBase = base > 0 ? ativAcum / base : 0;
    var conv = ativAcum > 0 ? vendasAcum / ativAcum : 0;
    var tmrDia = f.tmrScope === 'dia' ? f.dia : null;
    var tmr = tmrTotalLookup(tmrDia, f.vend || null, f.origem || null);

    var cards = [
      ['Base total', formatInt(base), 'deals no pipeline'],
      ['Ativados (acum.)', formatInt(ativAcum), 'no lancamento'],
      ['% da base ativada', pct(pctBase), 'acumulado'],
      ['Ativados no dia', formatInt(ativDia), diaLabel(f.dia)],
      ['Conversao geral', pct2(conv), 'vendas / ativados'],
      ['TMR mediana', tmr ? formatMin(tmr.mediana) : '—', (tmrDia ? diaLabel(tmrDia) : 'lancamento') + ' · mediana']
    ];
    document.getElementById('funil-kpis').innerHTML = cards.map(function (c) {
      return '<div class="kpi-card"><div class="kpi-label">' + c[0] + '</div>' +
        '<div class="kpi-main">' + c[1] + '</div><div class="kpi-sub">' + esc(c[2]) + '</div></div>';
    }).join('');
  }

  // ----- Combos hora a hora / dia a dia (barra volume + linha % do pipeline) -----
  function funilComboChart(key, canvasId, labels, bars, linePct, lineFmt, lineMax) {
    var c = themeColors();
    if (charts[key]) charts[key].destroy();
    charts[key] = new Chart(document.getElementById(canvasId).getContext('2d'), {
      type: 'bar',
      data: { labels: labels, datasets: [
        { type: 'bar', label: 'Ativados', data: bars, backgroundColor: c.gold, yAxisID: 'y',
          datalabels: { display: 'auto', anchor: 'end', align: 'top', color: c.text2,
            font: { size: 9, weight: 'bold' }, formatter: function (v) { return v > 0 ? formatInt(v) : ''; } } },
        { type: 'line', label: '% do pipeline', data: linePct, borderColor: c.blue, backgroundColor: c.blue,
          yAxisID: 'y1', tension: 0.3, pointRadius: 2, borderWidth: 2,
          datalabels: { display: 'auto', align: 'top', anchor: 'end', color: c.blue,
            font: { size: 8, weight: 'bold' }, formatter: function (v) { return lineFmt(v); } } }
      ]},
      options: {
        responsive: true, maintainAspectRatio: false,
        layout: { padding: { top: 22, right: 6 } },
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false }, datalabels: { display: false },
          tooltip: { callbacks: { label: function (it) {
            return it.dataset.yAxisID === 'y1' ? ('% pipeline: ' + lineFmt(it.parsed.y))
              : ('Ativados: ' + formatInt(it.parsed.y));
          }}}
        },
        scales: {
          x: { grid: { color: c.grid }, ticks: { color: c.text2, font: { size: 9 } } },
          y: { position: 'left', beginAtZero: true, grace: '20%', afterFit: function (s) { s.width = 44; },
            grid: { color: c.grid }, ticks: { color: c.text2, font: { size: 9 }, callback: function (v) { return formatInt(v); } } },
          y1: { position: 'right', beginAtZero: true, max: lineMax, grid: { display: false },
            afterFit: function (s) { s.width = 44; },
            ticks: { color: c.blue, font: { size: 9 }, callback: function (v) { return lineFmt(v); } } }
        }
      }
    });
  }
  function renderFunilHora() {
    var f = state.funilFiltro, base = baseFiltrada();
    var horas = []; for (var h = 0; h < 24; h++) horas.push(h);
    var contas = horas.map(function (h) {
      return ((state.funil && state.funil.ativados) || []).reduce(function (s, a) {
        return (a.dia === f.dia && a.hora === h && matchOV(a, f)) ? s + a.n : s;
      }, 0);
    });
    var acum = cumulativo(contas).map(function (v) { return base > 0 ? v / base : 0; });
    var labels = horas.map(function (h) { return String(h).padStart(2, '0') + 'h'; });
    var maxPct = Math.max.apply(null, acum.concat([0])) * 1.25 || 0.001;
    funilComboChart('fHora', 'funil-hora', labels, contas, acum, function (v) { return pct2(v); }, maxPct);
  }
  function renderFunilDia() {
    var f = state.funilFiltro, base = baseFiltrada();
    var dias = (state.funil && state.funil.dias) || [];
    var contas = dias.map(function (d) {
      return ((state.funil && state.funil.ativados) || []).reduce(function (s, a) {
        return (a.dia === d && matchOV(a, f)) ? s + a.n : s;
      }, 0);
    });
    var acum = cumulativo(contas).map(function (v) { return base > 0 ? v / base : 0; });
    var labels = dias.map(diaLabel);
    funilComboChart('fDia', 'funil-dia', labels, contas, acum, function (v) { return pct0(v); }, 1);
  }
  // match so de origem e vendedor (sem dia) — usado nos graficos que iteram dia/hora.
  function matchOV(row, f) {
    if (f.origem && row.origem !== f.origem) return false;
    if (f.vend && row.pmp !== f.vend) return false;
    return true;
  }

  // ----- Ativacao por origem (barras HTML) -----
  function renderFunilOrigem() {
    var f = state.funilFiltro;
    var usaDia = f.origemScope === 'dia';
    var base = {};
    ((state.funil && state.funil.basePorOrigem) || []).forEach(function (b) { base[b.origem] = b.total; });

    var linhas = (state.funil && state.funil.origens || []).map(function (origem) {
      var ativ = somaAtivados({ origem: origem, vend: f.vend, dia: usaDia ? f.dia : '' });
      var vend = somaVendas({ origem: origem, vend: f.vend, dia: usaDia ? f.dia : '' });
      var tot = base[origem] || ativ;
      return { origem: origem, ativ: ativ, tot: tot, vend: vend,
        ativacao: tot > 0 ? ativ / tot : 0, conv: ativ > 0 ? vend / ativ : 0 };
    }).filter(function (r) { return r.tot > 0 || r.ativ > 0; })
      .sort(function (a, b) { return b.ativ - a.ativ; });

    var maxAtiv = Math.max.apply(null, linhas.map(function (r) { return r.ativ; }).concat([1]));
    var head = '<div class="origem-row origem-head"><span></span><span></span>' +
      '<span class="origem-num">ATIVACAO</span><span class="origem-num">CONVERSAO</span></div>';
    document.getElementById('funil-origem').innerHTML = head + linhas.map(function (r) {
      var w = Math.round(100 * r.ativ / maxAtiv);
      var active = (f.origem && r.origem === f.origem) ? ' row-active' : '';
      return '<div class="origem-row origem-click' + active + '" data-origem="' + esc(r.origem) + '">' +
        '<span class="origem-nome" title="' + esc(r.origem) + '">' + esc(r.origem) + '</span>' +
        '<span class="origem-bar"><span class="origem-fill" style="width:' + w + '%"></span>' +
          '<span class="origem-val">' + formatInt(r.ativ) + ' / ' + formatInt(r.tot) + '</span></span>' +
        '<span class="origem-num">' + pct0(r.ativacao) + '</span>' +
        '<span class="origem-num conv">' + pct2(r.conv) + '</span>' +
      '</div>';
    }).join('') || '<div class="q-empty">Sem dados.</div>';
  }

  // ----- Tabela por vendedor (mix de origens inline + ativados/vendas/GMV/TKM/conv/TMR; ordenavel) -----
  // Colunas: key = chave de ordenacao (null = nao ordenavel); usadas no thead e no body.
  var FUNIL_COLS = [
    { key: 'nome',   label: 'VENDEDOR',                  cls: '' },
    { key: null,     label: 'ATIVADOS (MIX DE ORIGENS)', cls: '' },
    { key: 'ativ',   label: 'ATIV.',                     cls: 'num' },
    { key: 'vend',   label: 'VENDAS',                    cls: 'num' },
    { key: 'gmv',    label: 'GMV',                       cls: 'num' },
    { key: 'tkm',    label: 'TKM',                       cls: 'num' },
    { key: 'conv',   label: 'CONV.',                     cls: 'num' },
    { key: 'tmrMed', label: 'TMR MEDIANA',               cls: 'num' },
    { key: 'tmrAvg', label: 'TMR MEDIA',                 cls: 'num' },
    { key: 'resp',   label: '#RESP',                     cls: 'num' }
  ];
  function renderFunilTabela() {
    var f = state.funilFiltro;
    var usaDia = f.vendScope === 'dia';
    var scopeDia = usaDia ? f.dia : '';
    var origens = (state.funil && state.funil.origens) || [];
    var vendedores = (state.funil && state.funil.vendedores) || [];

    var rows = vendedores.filter(function (v) { return !f.vend || v.pmp === f.vend; }).map(function (v) {
      var ativ = somaAtivados({ pmpEq: v.pmp, origem: f.origem, dia: scopeDia });
      var vend = somaVendasPmp(v.pmp, f.origem, scopeDia);
      var gmv = somaGmvPmp(v.pmp, f.origem, scopeDia);
      var mix = origens.map(function (o) {
        return { origem: o, n: somaAtivados({ pmpEq: v.pmp, origem: o, dia: scopeDia }) };
      }).filter(function (x) { return x.n > 0; });
      var tmr = tmrTotalLookup(usaDia ? f.dia : null, v.pmp, f.origem || null);
      return { pmp: v.pmp, nome: v.nome, ativ: ativ, vend: vend, gmv: gmv,
        tkm: vend > 0 ? gmv / vend : 0, mix: mix,
        conv: ativ > 0 ? vend / ativ : 0, tmrMed: tmr ? tmr.mediana : 0,
        tmrAvg: tmr ? tmr.media : 0, resp: tmr ? tmr.n : 0 };
    }).filter(function (r) { return r.ativ > 0 || r.vend > 0; });

    // Ordenacao por coluna (state.funilSort): nome via localeCompare, demais numerico; desempate por ativados.
    var so = state.funilSort, mul = so.dir === 'asc' ? 1 : -1;
    rows.sort(function (a, b) {
      var d = so.col === 'nome' ? String(a.nome).localeCompare(String(b.nome)) : ((a[so.col] || 0) - (b[so.col] || 0));
      return (mul * d) || (b.ativ - a.ativ);
    });

    var origemColor = {};
    origens.forEach(function (o, i) { origemColor[o] = SELLER_COLORS[i % SELLER_COLORS.length]; });

    var seta = function (key) { return (key && so.col === key) ? (so.dir === 'asc' ? ' ▲' : ' ▼') : ''; };
    var thead = '<thead><tr>' + FUNIL_COLS.map(function (c) {
      return '<th class="' + c.cls + (c.key ? ' th-sort' : '') + '"' +
        (c.key ? ' data-col="' + c.key + '"' : '') + '>' + c.label + seta(c.key) + '</th>';
    }).join('') + '</tr></thead>';

    var body = rows.map(function (r) {
      var segs = r.mix.map(function (m) {
        var p = r.ativ > 0 ? Math.round(100 * m.n / r.ativ) : 0;
        return '<span class="mix-seg" title="' + esc(m.origem) + ': ' + formatInt(m.n) + '" ' +
          'style="width:' + p + '%;background:' + origemColor[m.origem] + '">' + (p >= 12 ? p + '%' : '') + '</span>';
      }).join('');
      var convCls = r.conv >= 0.005 ? 'pos' : 'neg';
      var active = (f.vend && r.pmp === f.vend) ? ' row-active' : '';
      return '<tr class="v-row' + active + '" data-pmp="' + esc(r.pmp) + '">' +
        '<td class="v-nome">' + esc(r.nome) + '</td>' +
        '<td class="v-mix"><div class="mix-bar">' + segs + '</div></td>' +
        '<td class="num">' + formatInt(r.ativ) + '</td>' +
        '<td class="num">' + formatInt(r.vend) + '</td>' +
        '<td class="num">' + (r.gmv > 0 ? formatBRLk(r.gmv) : '—') + '</td>' +
        '<td class="num">' + (r.tkm > 0 ? formatBRL(r.tkm) : '—') + '</td>' +
        '<td class="num ' + convCls + '">' + pct2(r.conv) + '</td>' +
        '<td class="num">' + formatMin(r.tmrMed) + '</td>' +
        '<td class="num">' + formatMin(r.tmrAvg) + '</td>' +
        '<td class="num dim">' + formatInt(r.resp) + '</td>' +
      '</tr>';
    }).join('');
    document.getElementById('funil-tabela').innerHTML = thead + '<tbody>' +
      (body || '<tr><td colspan="' + FUNIL_COLS.length + '" class="q-empty">Sem dados.</td></tr>') + '</tbody>';
  }
  // variantes que filtram por pmp exato (mantem somaAtivados generico legivel)
  function somaVendasPmp(pmp, origem, dia) {
    return ((state.funil && state.funil.vendas) || []).reduce(function (s, v) {
      if (v.pmp !== pmp) return s;
      if (origem && v.origem !== origem) return s;
      if (dia && v.dia !== dia) return s;
      return s + v.n;
    }, 0);
  }
  function somaGmvPmp(pmp, origem, dia) {
    return ((state.funil && state.funil.vendas) || []).reduce(function (s, v) {
      if (v.pmp !== pmp) return s;
      if (origem && v.origem !== origem) return s;
      if (dia && v.dia !== dia) return s;
      return s + (v.gmv || 0);
    }, 0);
  }

  // ----- TMR hora a hora (mediana + faixa p25-p75) -----
  function renderFunilTmrHora() {
    var f = state.funilFiltro;
    var tmrDia = f.tmrScope === 'dia' ? f.dia : null;
    var rows = ((state.funil && state.funil.tmrHora) || []).filter(function (r) {
      return (r.dia || null) === (tmrDia || null) &&
        (r.pmp || null) === (f.vend || null) && (r.origem || null) === (f.origem || null);
    });
    var byHora = {}; rows.forEach(function (r) { byHora[r.hora] = r; });
    var horas = Object.keys(byHora).map(Number).sort(function (a, b) { return a - b; });
    if (!horas.length) { for (var h = 8; h <= 22; h++) horas.push(h); }
    var labels = horas.map(function (h) { return String(h).padStart(2, '0') + 'h'; });
    var p25 = horas.map(function (h) { return byHora[h] ? byHora[h].p25 : null; });
    var p50 = horas.map(function (h) { return byHora[h] ? byHora[h].p50 : null; });
    var p75 = horas.map(function (h) { return byHora[h] ? byHora[h].p75 : null; });
    var c = themeColors();

    if (charts.fTmrHora) charts.fTmrHora.destroy();
    charts.fTmrHora = new Chart(document.getElementById('funil-tmr-hora').getContext('2d'), {
      type: 'line',
      data: { labels: labels, datasets: [
        { label: 'p25', data: p25, borderColor: 'transparent', pointRadius: 0, fill: false, hideInLegend: true,
          datalabels: { display: false } },
        { label: 'faixa p25-p75', data: p75, borderColor: 'transparent', backgroundColor: c.blue + '22',
          pointRadius: 0, fill: '-1', hideInLegend: true, datalabels: { display: false } },
        { label: 'mediana', data: p50, borderColor: c.blue, backgroundColor: c.blue,
          tension: 0.3, pointRadius: 2, borderWidth: 2,
          datalabels: { display: 'auto', align: 'top', anchor: 'end', color: c.text2,
            font: { size: 8, weight: 'bold' }, formatter: function (v) { return v ? String(v).replace('.', ',') : ''; } } }
      ]},
      options: {
        responsive: true, maintainAspectRatio: false,
        layout: { padding: { top: 18, right: 6 } },
        plugins: { legend: { display: false }, datalabels: { display: false },
          tooltip: { callbacks: { label: function (it) { return it.dataset.label + ': ' + formatMin(it.parsed.y); } } } },
        scales: {
          x: { grid: { color: c.grid }, ticks: { color: c.text2, font: { size: 9 } } },
          y: { beginAtZero: true, grace: '15%', grid: { color: c.grid },
            ticks: { color: c.text2, font: { size: 9 }, callback: function (v) { return v + "'"; } } }
        }
      }
    });
  }

  // ----- Bolha TMR x conversao por vendedor -----
  function renderFunilBolha() {
    var f = state.funilFiltro;
    var scopeDia = f.tmrScope === 'dia' ? f.dia : '';
    var vendedores = (state.funil && state.funil.vendedores) || [];
    var pts = vendedores.map(function (v) {
      var tmr = tmrTotalLookup(scopeDia || null, v.pmp, f.origem || null);
      var ativ = somaAtivados({ pmpEq: v.pmp, origem: f.origem, dia: scopeDia });
      var vend = somaVendasPmp(v.pmp, f.origem, scopeDia);
      return { nome: v.nome, x: tmr ? tmr.mediana : 0, y: ativ > 0 ? vend / ativ : 0, ativ: ativ };
    }).filter(function (p) { return p.ativ > 0; });
    var maxAtiv = Math.max.apply(null, pts.map(function (p) { return p.ativ; }).concat([1]));
    var c = themeColors();
    var dados = pts.map(function (p) {
      return { x: p.x, y: p.y, r: 6 + 18 * Math.sqrt(p.ativ / maxAtiv), nome: p.nome };
    });

    if (charts.fBolha) charts.fBolha.destroy();
    charts.fBolha = new Chart(document.getElementById('funil-bolha').getContext('2d'), {
      type: 'bubble',
      data: { datasets: [{ data: dados, backgroundColor: c.green + '99', borderColor: c.green,
        datalabels: { display: 'auto', color: c.text2, font: { size: 8 }, align: 'top',
          formatter: function (v, ctx) { return ctx.dataset.data[ctx.dataIndex].nome; } } }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        layout: { padding: { top: 18, right: 10 } },
        plugins: { legend: { display: false }, datalabels: { display: false },
          tooltip: { callbacks: { label: function (it) {
            var d = it.dataset.data[it.dataIndex];
            return d.nome + ': TMR ' + formatMin(d.x) + ' · conv ' + pct2(d.y) + ' · ' + formatInt(d.ativ) + ' ativ';
          } } } },
        scales: {
          x: { beginAtZero: true, title: { display: true, text: 'TMR mediana (min)', color: c.text2, font: { size: 9 } },
            grid: { color: c.grid }, ticks: { color: c.text2, font: { size: 9 }, callback: function (v) { return v + "'"; } } },
          y: { beginAtZero: true, title: { display: true, text: 'conversao', color: c.text2, font: { size: 9 } },
            grid: { color: c.grid }, ticks: { color: c.text2, font: { size: 9 }, callback: function (v) { return pct(v); } } }
        }
      }
    });
  }

  function aplicarFunil() {
    if (!state.funil) return;
    var t = document.getElementById('funil-scope');
    if (t) t.textContent = 'dia ' + state.funilFiltro.dia;
    renderFunilKpis();
    renderFunilHora();
    renderFunilDia();
    renderFunilOrigem();
    renderFunilTabela();
    renderFunilTmrHora();
    renderFunilBolha();
  }
  function limparFunil() {
    state.funilFiltro.origem = ''; state.funilFiltro.vend = '';
    document.getElementById('f-origem').value = '';
    document.getElementById('f-vend').value = '';
    if (state.funil) { state.funilFiltro.dia = diaDefaultFunil(state.funil); document.getElementById('f-dia').value = state.funilFiltro.dia; }
    aplicarFunil();
  }

  // ===== Wiring =====
  function bindSeg(id, prop, after) {
    document.querySelectorAll('#' + id + ' button').forEach(function (b) {
      b.addEventListener('click', function () {
        document.querySelectorAll('#' + id + ' button').forEach(function (x) { x.classList.remove('active'); });
        b.classList.add('active');
        state[prop] = b.dataset.mode || b.dataset.scope;
        if (after) after();
      });
    });
  }
  // Igual ao bindSeg, mas grava em state.funilFiltro[prop] (escopo Dia/Lancamento dos paineis).
  function bindScopeSeg(id, prop, after) {
    document.querySelectorAll('#' + id + ' button').forEach(function (b) {
      b.addEventListener('click', function () {
        document.querySelectorAll('#' + id + ' button').forEach(function (x) { x.classList.remove('active'); });
        b.classList.add('active');
        state.funilFiltro[prop] = b.dataset.scope;
        if (after) after();
      });
    });
  }
  function onDateChange() {
    var ini = document.getElementById('dt-inicio').value;
    var fim = document.getElementById('dt-fim').value;
    state.periodo = (ini || fim) ? {
      inicio: ini ? ini + 'T00:00:00-03:00' : '',
      fim: fim ? fim + 'T23:59:59-03:00' : ''
    } : null;
    if (state.mode === 'supabase') carregarSupabase();
  }

  function init() {
    try { applyTheme(localStorage.getItem('gerencial-theme') || 'dark'); } catch (e) { applyTheme('dark'); }
    if (window.ChartDataLabels) Chart.register(window.ChartDataLabels);

    document.querySelectorAll('#seg-view button').forEach(function (b) {
      b.addEventListener('click', function () { switchMode(b.dataset.mode); });
    });
    bindSeg('seg-rank', 'rankScope', function () { if (state.dash) renderRanking(state.dash.ranking || []); });
    bindSeg('seg-hora', 'horaMode', function () { if (state.dash) renderChartHora(state.dash.porHora || []); });
    bindSeg('seg-dia', 'diaMode', function () { if (state.dash) renderChartDia(state.dash.porDia || []); });

    // Funil: filtros + toggles Dia/Lancamento (so existem p/ nivel gerencial).
    var fDia = document.getElementById('f-dia');
    if (fDia) {
      fDia.addEventListener('change', function () { state.funilFiltro.dia = this.value; aplicarFunil(); });
      document.getElementById('f-origem').addEventListener('change', function () { state.funilFiltro.origem = this.value; aplicarFunil(); });
      document.getElementById('f-vend').addEventListener('change', function () { state.funilFiltro.vend = this.value; aplicarFunil(); });
      bindScopeSeg('seg-funil-origem', 'origemScope', renderFunilOrigem);
      bindScopeSeg('seg-funil-vend', 'vendScope', renderFunilTabela);
      bindScopeSeg('seg-funil-tmr', 'tmrScope', function () {
        renderFunilTmrHora(); renderFunilBolha(); renderFunilKpis();
      });

      // Click-to-filter: clicar numa ORIGEM (painel) ou VENDEDOR (tabela) filtra tudo; clicar de
      // novo no ja selecionado limpa (toggle). Mantem o <select> sincronizado.
      document.getElementById('funil-origem').addEventListener('click', function (e) {
        var row = e.target.closest('.origem-click'); if (!row) return;
        var v = row.getAttribute('data-origem');
        state.funilFiltro.origem = (state.funilFiltro.origem === v) ? '' : v;
        document.getElementById('f-origem').value = state.funilFiltro.origem;
        aplicarFunil();
      });
      document.getElementById('funil-tabela').addEventListener('click', function (e) {
        var th = e.target.closest('th.th-sort');
        if (th) {
          var col = th.getAttribute('data-col'), s = state.funilSort;
          if (s.col === col) { s.dir = (s.dir === 'asc') ? 'desc' : 'asc'; }
          else { s.col = col; s.dir = (col === 'nome') ? 'asc' : 'desc'; }
          renderFunilTabela();
          return;
        }
        var tr = e.target.closest('tr.v-row'); if (!tr) return;
        var p = tr.getAttribute('data-pmp');
        state.funilFiltro.vend = (state.funilFiltro.vend === p) ? '' : p;
        document.getElementById('f-vend').value = state.funilFiltro.vend;
        aplicarFunil();
      });
    }

    document.getElementById('dt-inicio').addEventListener('change', onDateChange);
    document.getElementById('dt-fim').addEventListener('change', onDateChange);
    document.getElementById('termo').addEventListener('keydown', function (e) { if (e.key === 'Enter') buscarVendas(); });

    var fitT;
    window.addEventListener('resize', function () { clearTimeout(fitT); fitT = setTimeout(fitKpis, 150); });

    setInterval(tickContagem, 1000);
    carregarSupabase();
  }
  init();
</script>
