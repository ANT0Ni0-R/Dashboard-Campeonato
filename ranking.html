<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranking Geral do Lançamento</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

    :root {
      --bg-main: #060913;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-gold: #fbbf24;
      --accent-green: #22c55e;
      --border-color: rgba(51, 65, 85, 0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-main);
      background-image: radial-gradient(circle at center, #0e162d 0%, #060913 100%);
      color: var(--text-primary);
      font-family: 'Plus Jakarta Sans', sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    .page { height: 100vh; display: flex; flex-direction: column; padding: 1.4rem 2rem; }

    /* Header */
    .header {
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid var(--border-color);
      padding: 0.8rem 2rem; border-radius: 16px; margin-bottom: 0.6rem;
    }
    .h-title-sec { display: flex; align-items: center; gap: 1.1rem; }
    .h-logo { font-size: 1.8rem; }
    .h-title {
      font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.55rem;
      background: linear-gradient(135deg, #fff 30%, var(--accent-gold) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .h-sub { font-size: 0.74rem; color: var(--text-secondary); margin-top: 0.1rem; }
    .h-meta { display: flex; align-items: center; gap: 1.6rem; }
    .h-total-label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; text-align: right; }
    .h-total-valor { font-family: monospace; font-size: 1.5rem; font-weight: 800; color: var(--accent-green); text-align: right; }
    .h-status { display: flex; flex-direction: column; align-items: flex-end; gap: 0.2rem; }
    .h-dot-row { display: flex; align-items: center; gap: 0.4rem; font-size: 0.78rem; color: var(--text-secondary); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
    .dot.err { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
    .dot.loading { background: var(--accent-gold); box-shadow: 0 0 6px var(--accent-gold); animation: pulse 1s infinite alternate; }
    @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
    .h-ultima { font-size: 0.68rem; color: var(--text-muted); }

    /* Sync bar */
    .sync {
      display: flex; align-items: center; gap: 1rem;
      background: rgba(15, 23, 42, 0.5); border: 1px solid var(--border-color);
      border-radius: 10px; padding: 0.3rem 0.9rem; margin-bottom: 0.5rem;
      font-size: 0.72rem; color: var(--text-secondary);
    }
    .sync strong { color: var(--text-primary); }
    .force-btn {
      background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.4);
      color: #60a5fa; font-size: 0.72rem; font-weight: 700;
      padding: 0.18rem 0.6rem; border-radius: 6px; cursor: pointer; white-space: nowrap;
    }
    .force-btn:hover { background: rgba(59,130,246,0.28); }
    .force-btn:active { transform: scale(0.96); }

    /* Tabela */
    .table-wrap { flex: 1; overflow-y: auto; padding-right: 0.4rem; }
    .table-wrap::-webkit-scrollbar { width: 6px; }
    .table-wrap::-webkit-scrollbar-track { background: transparent; }
    .table-wrap::-webkit-scrollbar-thumb { background: rgba(51,65,85,0.6); border-radius: 3px; }
    .table-wrap::-webkit-scrollbar-thumb:hover { background: rgba(100,116,139,0.8); }
    table { width: 100%; border-collapse: collapse; }
    th {
      padding: 0.55rem 1rem; font-size: 0.72rem; color: var(--text-secondary);
      text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border-color);
      position: sticky; top: 0; background: var(--bg-main); z-index: 2;
    }
    td { padding: 0.5rem 1rem; font-size: 0.9rem; border-bottom: 1px solid rgba(51,65,85,0.15); vertical-align: middle; }

    tr.pos-1 { background: rgba(250,204,21,0.06); border-left: 3px solid #facc15; }
    tr.pos-2 { background: rgba(203,213,225,0.04); border-left: 3px solid #cbd5e1; }
    tr.pos-3 { background: rgba(180,83,9,0.05); border-left: 3px solid #b45309; }
    tr.pos-n { border-left: 3px solid transparent; }

    .c-pos { font-family: 'Outfit',sans-serif; font-weight: 800; font-size: 1.1rem; width: 52px; text-align: center; color: var(--text-secondary); }
    tr.pos-1 .c-pos { color: #facc15; text-shadow: 0 0 10px rgba(250,204,21,0.4); }
    tr.pos-2 .c-pos { color: #cbd5e1; }
    tr.pos-3 .c-pos { color: #b45309; }

    .c-vend { display: flex; align-items: center; gap: 0.9rem; }
    .avatar {
      width: 40px; height: 40px; border-radius: 9px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Outfit',sans-serif; font-weight: 700; font-size: 0.95rem; color: #0b1120;
      border: 1.5px solid var(--border-color);
      overflow: hidden; position: relative;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; position: absolute; top: 0; left: 0; }
    .avatar .initials { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }
    .avatar img.loaded + .initials { display: none; }
    tr.pos-1 .avatar { border-color: #facc15; }
    tr.pos-2 .avatar { border-color: #cbd5e1; }
    tr.pos-3 .avatar { border-color: #b45309; }
    .v-info { display: flex; flex-direction: column; }
    .v-nome { font-family: 'Outfit',sans-serif; font-weight: 700; font-size: 1rem; }
    .v-pmp  { font-family: monospace; font-size: 0.72rem; color: var(--text-secondary); }

    .c-qtd { color: var(--text-secondary); font-size: 0.85rem; text-align: center; }
    .c-gmv { font-family: monospace; font-size: 1.1rem; font-weight: 800; color: var(--accent-gold); text-align: right; }
    tr.pos-1 .c-gmv { color: var(--accent-green); }

    /* Pódio (top 3) */
    .bq-podium { display: flex; justify-content: center; align-items: flex-end; gap: 1rem; margin: 0.2rem 0 1rem; flex-shrink: 0; }
    .bq-place { display: flex; flex-direction: column; align-items: center; width: 30%; max-width: 230px; }
    .bq-place.place-1 { width: 34%; }
    .bq-pod-card {
      display: flex; flex-direction: column; align-items: center; width: 100%;
      background: rgba(15,23,42,0.65); border: 1px solid var(--border-color);
      border-radius: 14px 14px 0 0; padding: 0.7rem 0.6rem;
    }
    /* Pódio sem medalhas: foto em destaque ocupando todo o quadro */
    .bq-place .avatar { width: 100%; height: auto; aspect-ratio: 4 / 3; font-size: 2.6rem; border-radius: 12px; }
    .bq-place.place-1 .avatar { border-color: #facc15; }
    .bq-place.place-2 .avatar { border-color: #cbd5e1; }
    .bq-place.place-3 .avatar { border-color: #b45309; }
    .bq-place.place-1 .bq-pod-card { border-color: rgba(250,204,21,0.5); box-shadow: 0 0 22px rgba(250,204,21,0.18); }
    .bq-pod-nome { font-family: 'Outfit',sans-serif; font-weight: 700; font-size: 1.05rem; margin-top: 0.45rem; text-align: center; }
    .bq-place.place-1 .bq-pod-nome { font-size: 1.2rem; }
    .bq-pod-pmp { font-family: monospace; font-size: 0.72rem; color: var(--text-secondary); }
    .bq-pod-gmv { font-family: monospace; font-weight: 800; font-size: 1.05rem; margin-top: 0.3rem; color: var(--accent-gold); }
    .bq-place.place-1 .bq-pod-gmv { color: var(--accent-green); }
    .bq-pod-qtd { font-size: 0.7rem; color: var(--text-muted); margin-top: 0.15rem; }
    .bq-bar { width: 100%; display: flex; align-items: center; justify-content: center; border-radius: 0 0 8px 8px; color: #0b1120; font-family: 'Outfit',sans-serif; font-weight: 800; font-size: 1.7rem; box-shadow: inset 0 2px 6px rgba(255,255,255,0.25); }
    .bq-place.place-1 .bq-bar { height: 88px; background: linear-gradient(180deg,#fde68a,#facc15); }
    .bq-place.place-2 .bq-bar { height: 62px; background: linear-gradient(180deg,#f1f5f9,#cbd5e1); }
    .bq-place.place-3 .bq-bar { height: 42px; background: linear-gradient(180deg,#fbbf24,#b45309); }

    .msg { text-align: center; padding: 3rem; color: var(--text-secondary); font-size: 1rem; }
    .msg.err { color: #ef4444; }
    .msg small { display: block; color: var(--text-muted); font-size: 0.8rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="h-title-sec">
      <span class="h-logo">🏅</span>
      <div>
        <div class="h-title">Ranking Geral do Lançamento</div>
        <div class="h-sub" id="sub">Carregando...</div>
      </div>
    </div>
    <div class="h-meta">
      <div>
        <div class="h-total-label">GMV Total</div>
        <div class="h-total-valor" id="total">R$ —</div>
      </div>
      <div class="h-status">
        <div class="h-dot-row"><span class="dot loading" id="dot"></span><span id="status-label">Carregando...</span></div>
        <div class="h-ultima" id="ultima">—</div>
      </div>
    </div>
  </div>

  <div class="sync">
    <button class="force-btn" onclick="carregar()">↻ Atualizar agora</button>
    <span>Dados do <strong>Supabase</strong> · atualização automática · próxima em <strong id="countdown">--:--</strong></span>
  </div>

  <div class="bq-podium" id="podium"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:60px">Pos</th>
          <th>Vendedor</th>
          <th style="text-align:center; width:90px">Vendas</th>
          <th style="text-align:right; width:180px">GMV</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="4" class="msg">Conectando ao Supabase...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script src="config.js"></script>
<script>
  // Intervalo de polling alinhado ao Supabase (config.js). Default 60s.
  var RELOAD_MS = (COMPETICAO.supabase.poll_segundos || 60) * 1000;
  var nextReload = Date.now() + RELOAD_MS;

  carregar();
  setInterval(carregar, RELOAD_MS);
  setInterval(tickCountdown, 1000);

  // Le as transacoes do Supabase (ou JSON local como fallback) e agrega por PMP.
  async function fetchTransactions() {
    var sb = COMPETICAO.supabase;
    var hasSupabase = sb.url && sb.anon_key &&
                      !sb.url.includes("[A DEFINIR]") &&
                      !sb.anon_key.includes("__SUPABASE_ANON_KEY__");

    if (hasSupabase) {
      try {
        var base = sb.url + "/rest/v1/" + sb.tabela +
                   "?type=eq.order_success&select=price,pmp,created_at,slug,email";
        var padrao = encodeURIComponent(COMPETICAO.produto.slug_like.replace(/%/g, "*"));
        var url = base + "&slug=ilike." + padrao + "&created_at=gte.2026-06-16T00:00:00-03:00";
        var resp = await fetch(url, {
          method: "GET",
          headers: { apikey: sb.anon_key, Authorization: "Bearer " + sb.anon_key }
        });
        if (resp.ok) return { rows: await resp.json(), fonte: "Supabase" };
        console.warn("Supabase retornou erro HTTP:", resp.status);
      } catch (e) {
        console.warn("Falha ao consultar o Supabase REST API. Usando fallback JSON.", e);
      }
    }

    // Fallback: JSON local com deslocamento de +154 dias (igual ao app.js)
    var resp2 = await fetch("db_transactions_events_rows.json?_=" + Date.now());
    if (!resp2.ok) throw new Error("Fallback JSON indisponível (HTTP " + resp2.status + ")");
    var local = await resp2.json();
    var OFFSET_MS = 154 * 24 * 60 * 60 * 1000;
    var rows = local
      .filter(function (t) { return t.type === "order_success"; })
      .map(function (t) {
        var nt = new Date(new Date(t.created_at).getTime() + OFFSET_MS);
        return { price: t.price, pmp: t.pmp, email: t.email, slug: t.slug, created_at: nt.toISOString() };
      });
    return { rows: rows, fonte: "JSON local (teste)" };
  }

  // Agrega transacoes por seller_code (PMP), aplicando exclusao de e-mails.
  function agregar(rows) {
    var excluir = (COMPETICAO.produto.excluir_emails || []).map(function (e) { return e.toLowerCase(); });
    var ajustes = (COMPETICAO.produto.ajustar_precos || {});
    var acc = {};
    rows.forEach(function (t) {
      if (!t.pmp) return;
      var email = (t.email || "").trim().toLowerCase();
      if (email && excluir.indexOf(email) !== -1) return;
      var seg = t.pmp.split("-");
      var code = seg[seg.length - 1].toUpperCase();
      if (code.length !== 3 || !COMPETICAO.vendedores[code]) return;
      // Override de price por e-mail (por transacao)
      var precoEfetivo = (email && ajustes.hasOwnProperty(email)) ? ajustes[email] : t.price;
      if (!acc[code]) acc[code] = { pmp: code, nome: COMPETICAO.vendedores[code].nome, gmv: 0, qtd: 0 };
      acc[code].gmv += Number(precoEfetivo) || 0;
      acc[code].qtd += 1;
    });
    return Object.keys(acc).map(function (k) { return acc[k]; })
      .sort(function (a, b) { return b.gmv - a.gmv; });
  }

  async function carregar() {
    setDot("loading", "Atualizando...");
    nextReload = Date.now() + RELOAD_MS;
    try {
      var res = await fetchTransactions();
      render(agregar(res.rows), res.fonte);
    } catch (err) {
      setDot("err", "Erro");
      document.getElementById("ultima").textContent = err && err.message ? err.message : "Falha na consulta";
      document.getElementById("tbody").innerHTML =
        '<tr><td colspan="4" class="msg err">' + (err && err.message ? err.message : "Erro ao consultar") +
        "<small>Verifique a conexão com o Supabase.</small></td></tr>";
    }
  }

  function avatarHtml(v) {
    var cfg = COMPETICAO.vendedores[v.pmp];
    var foto = cfg ? cfg.foto : "";
    return '<div class="avatar" style="background:' + cor(v.nome) + '">' +
             (foto ? '<img src="' + foto + '" onload="this.className=\'loaded\'" onerror="this.style.display=\'none\'">' : "") +
             '<span class="initials">' + iniciais(v.nome) + "</span>" +
           "</div>";
  }

  function render(vend, fonte) {
    var tbody = document.getElementById("tbody");
    var podium = document.getElementById("podium");

    document.getElementById("sub").textContent = "Produto: " + COMPETICAO.produto.slug_like.replace(/%/g, "");

    if (!vend.length) {
      podium.innerHTML = "";
      tbody.innerHTML = '<tr><td colspan="4" class="msg">Nenhum dado encontrado.</td></tr>';
      document.getElementById("total").textContent = "R$ 0,00";
      setDot("ok", fonte);
      return;
    }

    var totalGMV = vend.reduce(function (s, v) { return s + v.gmv; }, 0);
    document.getElementById("total").textContent = fmt(totalGMV);

    // Pódio: top 3, na ordem visual 2 - 1 - 3
    var top3 = vend.slice(0, 3);
    var ordem = [ { v: top3[1], pos: 2 }, { v: top3[0], pos: 1 }, { v: top3[2], pos: 3 } ];
    podium.innerHTML = ordem.map(function (o) {
      if (!o.v) return '<div class="bq-place place-' + o.pos + '"></div>';
      return "" +
        '<div class="bq-place place-' + o.pos + '">' +
          '<div class="bq-pod-card">' +
            avatarHtml(o.v) +
            '<div class="bq-pod-nome">' + esc(o.v.nome) + "</div>" +
            '<div class="bq-pod-pmp">' + esc(o.v.pmp) + "</div>" +
            '<div class="bq-pod-gmv">' + fmt(o.v.gmv) + "</div>" +
            '<div class="bq-pod-qtd">' + o.v.qtd + " vendas</div>" +
          "</div>" +
          '<div class="bq-bar"><span>' + o.pos + "</span></div>" +
        "</div>";
    }).join("");

    // Lista: 4º em diante
    var resto = vend.slice(3);
    if (!resto.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="msg" style="padding:1.2rem">Apenas o pódio nesta consulta.</td></tr>';
    } else {
      tbody.innerHTML = resto.map(function (v, i) {
        var pos = i + 4;
        return "" +
          '<tr class="pos-n">' +
            '<td class="c-pos">' + pos + "°</td>" +
            "<td><div class=\"c-vend\">" +
              avatarHtml(v) +
              '<div class="v-info"><span class="v-nome">' + esc(v.nome) + "</span>" +
              '<span class="v-pmp">' + esc(v.pmp) + "</span></div>" +
            "</div></td>" +
            '<td class="c-qtd">' + v.qtd + "</td>" +
            '<td class="c-gmv">' + fmt(v.gmv) + "</td>" +
          "</tr>";
      }).join("");
    }

    setDot("ok", fonte);
    document.getElementById("ultima").textContent = "Atualizado: " + new Date().toLocaleTimeString("pt-BR");
  }

  function tickCountdown() {
    var s = Math.max(0, Math.round((nextReload - Date.now()) / 1000));
    var m = String(Math.floor(s / 60)).padStart(2, "0");
    var ss = String(s % 60).padStart(2, "0");
    document.getElementById("countdown").textContent = m + ":" + ss;
  }

  function fmt(v) {
    return "R$ " + Number(v).toLocaleString("pt-BR", { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  }
  function iniciais(nome) {
    var p = String(nome).trim().split(/\s+/);
    return ((p[0] || "")[0] || "") + ((p[p.length - 1] || "")[0] || "");
  }
  function cor(nome) {
    var cores = ["#fbbf24","#22c55e","#3b82f6","#a78bfa","#f472b6","#fb923c","#2dd4bf","#facc15"];
    var h = 0; for (var i = 0; i < nome.length; i++) h = nome.charCodeAt(i) + ((h << 5) - h);
    return cores[Math.abs(h) % cores.length];
  }
  function esc(s) {
    return String(s).replace(/[&<>"]/g, function (c) {
      return { "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c];
    });
  }
  function setDot(state, label) {
    var dot = document.getElementById("dot");
    dot.className = "dot" + (state === "err" ? " err" : state === "loading" ? " loading" : "");
    document.getElementById("status-label").textContent = label;
  }
</script>
</body>
</html>
