name: Deploy Copa Dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Permite uma execução concorrente, cancelando a anterior em andamento
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Monta o site apenas com os arquivos da Copa
        run: |
          mkdir -p _site
          cp index.html ranking.html app.js styles.css config.js _site/
          cp db_transactions_events_rows.json _site/
          cp -r fotos flags _site/

      - name: Injeta a anon_key do Supabase a partir do secret
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::warning::Secret SUPABASE_ANON_KEY vazio. O site usara o fallback JSON."
          fi
          # Substitui o placeholder no config.js publicado (nao toca no arquivo versionado).
          python3 - "$SUPABASE_ANON_KEY" <<'PY'
          import sys, pathlib
          key = sys.argv[1]
          p = pathlib.Path("_site/config.js")
          p.write_text(p.read_text().replace("__SUPABASE_ANON_KEY__", key))
          PY

      - name: Configura o GitHub Pages (habilita se necessario)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Faz upload do artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publica no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
